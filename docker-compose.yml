services:
  frontend:
    build:
      context: ./frontend-jet
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "8080:80"

  backend:
    build:
      context: ./backend-jet
      dockerfile: Dockerfile
    environment:
      APP_ENV: local
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/chefpick
      REDIS_URL: redis://redis:6379/0
      CORS_ALLOWED_ORIGINS: http://localhost:5173,http://localhost:8080,http://127.0.0.1:8080
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/v1/health')",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: chefpick
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d chefpick"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  backend-test:
    profiles: ["test"]
    build:
      context: ./backend-jet
      dockerfile: Dockerfile.test

  frontend-test:
    profiles: ["test"]
    build:
      context: ./frontend-jet
      dockerfile: Dockerfile.test

volumes:
  postgres_data:
